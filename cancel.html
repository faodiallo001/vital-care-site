<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Payment Cancelled | Vital Care Allied Health Training Institute</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        body{

            margin:0;
            font-family:Arial,Helvetica,sans-serif;
            background:#0d0d0d;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;

        }

        .cancel-box{

            width:90%;
            max-width:700px;
            background:#181818;
            border:1px solid rgba(255,255,255,.08);
            border-radius:18px;
            padding:60px 40px;
            text-align:center;

        }

        .icon{

            width:90px;
            height:90px;
            margin:auto;
            border-radius:50%;
            background:#b42318;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:46px;
            font-weight:bold;

        }

        h1{

            margin-top:30px;
            font-size:38px;

        }

        p{

            color:#cfcfcf;
            font-size:18px;
            line-height:1.8;

        }

        .buttons{

            margin-top:35px;
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;

        }

        .btn{

            display:inline-block;
            padding:16px 34px;
            text-decoration:none;
            border-radius:10px;
            font-weight:bold;
            transition:.3s;

        }

        .retry{

            background:#8d1d32;
            color:white;

        }

        .retry:hover{

            background:#a9233c;

        }

        .home{

            background:#2d2d2d;
            color:white;

        }

        .home:hover{

            background:#404040;

        }

    </style>

</head>

<body>

<div class="cancel-box">

<div class="icon">

✕

</div>

<h1>

Payment Cancelled

</h1>

<p>

Your payment was not completed.

</p>

<p>

No charges have been made to your card. If you still wish to enroll, you can return and complete your payment at any time.

</p>

<div class="buttons">

<a href="book-online.html" class="btn retry">

Try Again

</a>

<a href="index.html" class="btn home">

Return Home

</a>

</div>

</div>

</body>

</html>
